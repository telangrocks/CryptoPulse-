groups:
  - name: cryptopulse_alerts
    rules:
      # Application Health Alerts
      - alert: ApplicationDown
        expr: up{job="cryptopulse-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CryptoPulse application is down"
          description: "The CryptoPulse backend application has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second for the last 5 minutes."

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }} seconds."

      # System Resource Alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% for more than 5 minutes."

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% for more than 5 minutes."

      - alert: DiskSpaceLow
        expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space is running low"
          description: "Disk usage is {{ $value }}% for more than 5 minutes."

      # Database Alerts
      - alert: DatabaseDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "The PostgreSQL database has been down for more than 1 minute."

      - alert: DatabaseConnectionsHigh
        expr: pg_stat_database_numbackends / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connection usage"
          description: "Database connections are at {{ $value }}% of maximum."

      # Redis Alerts
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Redis memory usage"
          description: "Redis memory usage is {{ $value }}% for more than 5 minutes."

      # Trading Specific Alerts
      - alert: TradingAPIError
        expr: rate(trading_api_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High trading API error rate"
          description: "Trading API error rate is {{ $value }} errors per second."

      - alert: MarketDataStale
        expr: time() - market_data_last_update_timestamp > 300
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Market data is stale"
          description: "Market data has not been updated for {{ $value }} seconds."

      - alert: HighTradingVolume
        expr: rate(trading_volume_total[1h]) > 1000000
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "High trading volume detected"
          description: "Trading volume is {{ $value }} per hour."

      # Security Alerts
      - alert: HighFailedLogins
        expr: rate(auth_failed_logins_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High failed login attempts"
          description: "Failed login rate is {{ $value }} per second for the last 5 minutes."

      - alert: SuspiciousActivity
        expr: rate(security_suspicious_requests_total[5m]) > 0.01
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Suspicious activity detected"
          description: "Suspicious request rate is {{ $value }} per second for the last 5 minutes."

      # Business Logic Alerts
      - alert: PortfolioRiskHigh
        expr: portfolio_risk_score > 0.8
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Portfolio risk is high"
          description: "Portfolio risk score is {{ $value }} (threshold: 0.8)."

      - alert: StopLossTriggered
        expr: trading_stop_loss_triggered_total > 0
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Stop loss triggered"
          description: "Stop loss has been triggered {{ $value }} times."

      # Infrastructure Alerts
      - alert: NginxDown
        expr: up{job="nginx-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Nginx is down"
          description: "Nginx has been down for more than 1 minute."

      - alert: SSLCertificateExpiring
        expr: (ssl_certificate_expiry_timestamp - time()) / 86400 < 30
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate expires in {{ $value }} days."

      - alert: BackupFailed
        expr: backup_last_success_timestamp < time() - 86400
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Backup failed"
          description: "Last successful backup was {{ $value }} seconds ago."

