    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "CryptoPulse Trading Bot",
      "description": "AI-powered cryptocurrency trading bot with advanced market analysis and automated trading strategies",

        "name": "Shrikant Telang"
      },

        "price": "0",

        "Real-time Market Analysis",
        "Automated Trading Strategies",
        "Risk Management",
        "Performance Analytics",
        "Multi-Exchange Support"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen while React app loads -->
      <div style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0f172a 0%, #8b5cf6 50%, #0f172a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        z-index: 9999;
      ">
        <div style="text-align: center;">
          <div style="font-size: 4rem; margin-bottom: 1rem; animation: pulse 2s infinite;">🚀</div>
          <h1 style="font-size: 2rem; margin-bottom: 0.5rem; background: linear-gradient(45deg, #8b5cf6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CryptoPulse Trading Bot</h1>
          <p style="opacity: 0.8; margin-bottom: 2rem;">Loading your AI-powered trading platform...</p>
          <div style="
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #8b5cf6;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
          "></div>
        </div>
      </div>
    </div>
    
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
