<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoPulse - AI-Powered Trading Bot</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f172a;
        color: white;
        line-height: 1.6;
      }
      
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0f172a 0%, #8b5cf6 50%, #0f172a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-content {
        text-align: center;
        max-width: 400px;
        padding: 2rem;
      }
      
      .logo {
        font-size: 4rem;
        margin-bottom: 1rem;
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      
      h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(45deg, #8b5cf6, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .subtitle {
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 2rem;
      }
      
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #8b5cf6;
        animation: spin 1s ease-in-out infinite;
        margin: 0 auto;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .status {
        margin-top: 1rem;
        color: rgba(255, 255, 255, 0.8);
      }
      
      .error-message {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #ef4444;
        padding: 1rem;
        border-radius: 8px;
        margin-top: 1rem;
      }
      
      .retry-btn {
        background: linear-gradient(45deg, #8b5cf6, #06b6d4);
        color: white;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 1rem;
        transition: transform 0.3s ease;
      }
      
      .retry-btn:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <div class="loading-content">
          <div class="logo">🚀</div>
          <h1>CryptoPulse Trading Bot</h1>
          <p class="subtitle">AI-Powered Cryptocurrency Trading Platform</p>
          <div class="spinner"></div>
          <div class="status">Loading your trading platform...</div>
          <div class="error-message" id="error-message" style="display: none;">
            <strong>Build Error Detected</strong><br>
            The React app build failed. This is a temporary issue with the deployment process.<br>
            <button class="retry-btn" onclick="location.reload()">Retry Loading</button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load the actual React app -->
    <script type="text/babel" src="app.js"></script>
    
    <script>
      // Show error message after 15 seconds if app doesn't load
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('loading-container')) {
          document.getElementById('error-message').style.display = 'block';
        }
      }, 15000);
    </script>
  </body>
</html>
